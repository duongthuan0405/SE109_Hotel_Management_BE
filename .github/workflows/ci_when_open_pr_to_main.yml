name: CI when a PR to main opened, synchronized, or reopened

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

jobs:
  checkout-build-test:
    # Môi trường chạy
    runs-on: ubuntu-latest
    environment:
      name: test

    strategy:
      matrix:
        node-version: [20]

    if: ${{ !contains(fromJson('["CI-CD"]'), github.head_ref) }}

    steps:
      - name: Log information
        run: |
          echo "Pull Request #${{ github.event.number }} opened by ${{ github.event.pull_request.user.login }}"
          echo "Source branch: ${{ github.head_ref }}"
          echo "Target branch: ${{ github.base_ref }}"

      - name: Checkout code from source branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ./hotel-management-be/package-lock.json

      - name: Build and Test
        working-directory: ./hotel-management-be
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT || '4000' }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          OTP_LENGTH: ${{ secrets.OTP_LENGTH }}
          OTP_DURATION_IN_MINUTES: ${{ secrets.OTP_DURATION_IN_MINUTES }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          npm ci
          npm run build
          npm test

  final-check-be:
    runs-on: ubuntu-latest
    needs: checkout-build-test

    if: always() && needs.checkout-build-test.result != 'failure'

    steps:
      - name: Final check
        run: |
          echo "All checks passed for PR #${{ github.event.number }}. Ready for review!"
