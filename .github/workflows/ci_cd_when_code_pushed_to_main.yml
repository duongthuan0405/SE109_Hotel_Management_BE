name: CI/CD when code pushed to main

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  checkout-build-test:
    runs-on: ubuntu-latest
    environment:
      name: test

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code from main branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ./hotel-management-be/package-lock.json

      - name: Build and Test
        working-directory: ./hotel-management-be
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT || '4000' }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          OTP_LENGTH: ${{ secrets.OTP_LENGTH }}
          OTP_DURATION_IN_MINUTES: ${{ secrets.OTP_DURATION_IN_MINUTES }}
        run: |
          npm ci
          npm run build
          npm test

  build-container-and-push-to-registry:
    runs-on: ubuntu-latest
    needs: checkout-build-test

    steps:
      - name: Checkout code from main branch
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Sign in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        working-directory: ./hotel-management-be
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hotel-management-be:${{ env.SHORT_SHA }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/hotel-management-be:${{ env.SHORT_SHA }} ${{ secrets.DOCKER_USERNAME }}/hotel-management-be:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/hotel-management-be:${{ env.SHORT_SHA }}
          docker push ${{ secrets.DOCKER_USERNAME }}/hotel-management-be:latest

  deploy-to-production:
    runs-on: ubuntu-latest
    needs: build-container-and-push-to-registry
    environment:
      name: production

    steps:
      - name: Deploy to production environment
        run: |
          echo "Deploying to production environment..."
